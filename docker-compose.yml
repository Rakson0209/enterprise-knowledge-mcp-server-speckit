services:
  knowledge-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      KB_DATA_DIR: /data
      PORT: "8080"
    volumes:
      - kb_data:/data
    # Liveness probe hits the /health endpoint.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  kb_data:
